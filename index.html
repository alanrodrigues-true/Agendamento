<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agendamento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="container">
    <h1>Agende seu horário</h1>

    <button onclick="agendar()">Agendar</button>

    <p id="mensagem"></p>
  </div>

  <h2>Agendamentos:</h2>
  <ul id="lista"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
